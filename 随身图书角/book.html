<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随身图书角 · 书库</title>
<style>
  :root {
    --ink: #1a3048; --ink-muted: #4a6278; --celadon-deep: #2e5a7a;
    --sky: #eef4f8; --paper: #faf9f6; --card: #ffffff;
    --border: #8fafc8; --border-light: #b8cfe0;
    --accent: #3d6b94; --accent-hover: #254d6b; --shadow: rgba(30, 70, 110, 0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background-color: #b8cfe0;
    background-image: linear-gradient(180deg, #dce8f4 0%, #c5d8e8 40%, #9eb8cc 75%, #7a9aad 100%);
    color: var(--ink); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    position: relative; overflow-x: hidden;
  }
  .landscape-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .landscape-bg svg { position: absolute; inset: 0; width: 100%; height: 100%; min-height: 100vh; }
  body > *:not(.landscape-bg) { position: relative; z-index: 1; }
  nav {
    width: 100%; max-width: 760px; display: flex; gap: 12px;
    padding: 1.4rem 1rem 0.9rem; margin-bottom: 1.5rem;
    border-bottom: 2px solid var(--border);
  }
  nav a {
    text-decoration: none; font-size: 1rem; font-weight: 500;
    color: var(--ink-muted); background: var(--card);
    padding: 0.45rem 1.1rem; border-radius: 2px 2px 0 0;
    border: 1px solid var(--border-light); border-bottom: none;
    box-shadow: 0 2px 6px var(--shadow);
    display: inline-flex; align-items: center; gap: 8px; letter-spacing: 0.08em;
    transition: all 0.25s;
  }
  nav a::after {
    content: ""; display: inline-block; width: 7px; height: 7px;
    background: var(--celadon-deep); border-radius: 50%;
  }
  nav a:hover { background: var(--sky); color: var(--ink); }
  .container { width: 100%; max-width: 760px; padding: 0 1rem 4rem; }
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1.4rem; flex-wrap: wrap; gap: 0.8rem;
  }
  .btn {
    background: linear-gradient(180deg, var(--accent), var(--celadon-deep));
    color: #f5f9fc; border: 1px solid var(--celadon-deep);
    padding: 0.55rem 1.4rem; border-radius: 2px; font-size: 0.92rem;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.2s;
    font-family: inherit;
    box-shadow: 0 2px 8px rgba(46,90,122,0.2);
  }
  .btn:hover { filter: brightness(1.05); }
  .btn.secondary {
    background: var(--card); color: var(--ink-muted);
    border: 1px solid var(--border); box-shadow: none;
  }
  .btn.secondary:hover { background: var(--sky); color: var(--ink); transform: none; }
  .form-card {
    background: rgba(255,255,255,0.96); border: 1px solid var(--border);
    border-radius: 4px; padding: 2rem; margin-bottom: 2rem;
    display: none; box-shadow: 0 6px 24px var(--shadow);
  }
  .form-card.active { display: block; }
  .form-card h3 {
    font-family: "Noto Serif SC", serif;
    color: var(--celadon-deep); margin-bottom: 1rem;
    font-size: 1.1rem; font-weight: 500;
  }
  .form-row { margin-bottom: 1rem; }
  .form-row label { font-size: 0.8rem; font-weight: 500; color: var(--ink-muted); display: block; margin-bottom: 0.3rem; }
  input, textarea {
    width: 100%; padding: 0.6rem 0.8rem; border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.95rem; background: #fffcf9;
    font-family: inherit; color: var(--ink);
  }
  input:focus, textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(61,107,148,0.12);
  }
  .inline-group { display: flex; gap: 1rem; flex-wrap: wrap; }
  .inline-group .form-row { flex: 1; min-width: 140px; }
  .book-card {
    background: rgba(255,255,255,0.94); border: 1px solid var(--border-light);
    border-radius: 4px; padding: 1.6rem 1.5rem; margin-bottom: 1.2rem;
    box-shadow: 0 4px 16px var(--shadow); position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .book-card:hover { border-color: var(--border); box-shadow: 0 6px 20px var(--shadow); }
  .book-card h2 {
    font-family: "Noto Serif SC", serif;
    font-size: 1.4rem; color: var(--celadon-deep);
    margin-bottom: 0.8rem;
    border-bottom: 1px solid var(--border-light); padding-bottom: 0.4rem;
    padding-right: 4rem;
  }
  .book-card p { margin-bottom: 0.4rem; font-size: 0.95rem; color: var(--ink-muted); }
  .book-card p strong { color: var(--ink); }
  .book-card img {
    max-width: 180px; border-radius: 2px; margin-top: 10px;
    border: 1px solid var(--border-light); box-shadow: 0 2px 8px var(--shadow);
  }
  .book-card .edit-btn {
    position: static;
    background: var(--card); border: 1px solid var(--border-light);
    color: var(--ink-muted); font-size: 0.85rem;
    cursor: pointer; padding: 0.25rem 0.75rem; border-radius: 2px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .book-card .edit-btn:hover {
    background: var(--sky); color: var(--accent); border-color: var(--accent);
  }
  .book-card .card-actions {
    position: absolute; top: 1rem; right: 1rem;
    display: flex; gap: 0.4rem;
  }
  .book-card .delete-btn {
    background: var(--card); border: 1px solid var(--border-light);
    color: var(--ink-muted); font-size: 0.85rem;
    cursor: pointer; padding: 0.25rem 0.75rem; border-radius: 2px;
    font-family: inherit; transition: all 0.2s;
  }
  .book-card .delete-btn:hover {
    color: #8b3a3a; border-color: #c9a0a0; background: #faf0f0;
  }
  .empty { text-align: center; color: var(--ink-muted); padding: 4rem 2rem; }
  .info { color: var(--ink-muted); font-size: 0.9rem; }
</style>
</head>

  function escapeHtml(text) {
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function persistBooks() {
    writeDataCache(YUXIU_STORAGE.BOOKS, BOOKS_DATA, true);
  }

  function bookMatchesKeyword(book) {
    if (!keyword) return true;
    return (book.书名 && book.书名.includes(keyword)) ||
           (book.作者 && book.作者.includes(keyword)) ||
           (book.笔记 && book.笔记.includes(keyword));
  }

  function renderBooks() {
    var visibleCount = 0;
    var html = '';
    for (var i = 0; i < BOOKS_DATA.length; i++) {
      var book = BOOKS_DATA[i];
      if (!bookMatchesKeyword(book)) continue;
      visibleCount++;
      html += '<div class="book-card">' +
        '<div class="card-actions">' +
        '<button type="button" class="edit-btn" data-idx="' + i + '">编辑</button>' +
        '<button type="button" class="delete-btn" data-idx="' + i + '">删除</button></div>' +
        '<h2>' + escapeHtml(book.书名 || '佚名') + '</h2>' +
        '<p><strong>作者：</strong>' + escapeHtml(book.作者 || '不详') + '</p>' +
        '<p><strong>分类：</strong>' + escapeHtml(book.专业类别 || '') + ' ' + escapeHtml(book.中图分类号 || '') + '</p>' +
        (book.笔记 ? '<p><strong>笔记：</strong>' + escapeHtml(book.笔记) + '</p>' : '') +
        (book.图片路径 ? '<img src="' + escapeHtml(book.图片路径) + '" alt="' + escapeHtml(book.书名) + '">' : '') +
      '</div>';
    }
    infoText.textContent = keyword ? '搜索结果：' + visibleCount + ' 本书' : '全部藏书：' + BOOKS_DATA.length + ' 本';
    if (visibleCount === 0) {
      resultsDiv.innerHTML = '<div class="empty">未找到与「' + escapeHtml(keyword) + '」相关的书籍。</div>';
      return;
    }
    resultsDiv.innerHTML = html;
  }

  resultsDiv.addEventListener('click', function(e) {
    var delBtn = e.target.closest('.delete-btn');
    if (delBtn) {
      e.preventDefault();
      var idx = parseInt(delBtn.getAttribute('data-idx'), 10);
      if (isNaN(idx) || idx < 0 || idx >= BOOKS_DATA.length) return;
      var title = (BOOKS_DATA[idx] && BOOKS_DATA[idx].书名) || '此书';
      showConfirmDialog('确认要删除《' + title + '》吗？').then(function(ok) {
        if (!ok) return;
        BOOKS_DATA.splice(idx, 1);
        renderBooks();
        persistBooks();
      });
      return;
    }
    var editBtn = e.target.closest('.edit-btn');
    if (editBtn) {
      e.preventDefault();
      openEditForm(parseInt(editBtn.getAttribute('data-idx'), 10));
    }
  });

  window.addEventListener('pageshow', function() {
    BOOKS_DATA = loadStoredData(YUXIU_STORAGE.BOOKS, EMBEDDED_BOOKS);
    renderBooks();
  });

  function openEditForm(index) {
    if (index === -1) {
      document.getElementById('formTitle').textContent = '添加新书';
      editIndexInput.value = '-1';
      titleInput.value = '';
      authorInput.value = '';
      codeInput.value = '';
      categoryInput.value = '';
      noteInput.value = '';
      imageInput.value = '';
    } else {
      var book = BOOKS_DATA[index];
      document.getElementById('formTitle').textContent = '编辑《' + book.书名 + '》';
      editIndexInput.value = index;
      titleInput.value = book.书名 || '';
      authorInput.value = book.作者 || '';
      codeInput.value = book.中图分类号 || '';
      categoryInput.value = book.专业类别 || '';
      noteInput.value = book.笔记 || '';
      imageInput.value = book.图片路径 || '';
    }
    bookForm.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function closeForm() {
    bookForm.classList.remove('active');
  }

  document.getElementById('saveBookBtn').addEventListener('click', function() {
    var index = parseInt(editIndexInput.value);
    var bookData = {
      "书名": titleInput.value.trim(),
      "作者": authorInput.value.trim(),
      "中图分类号": codeInput.value.trim(),
      "专业类别": categoryInput.value.trim(),
      "笔记": noteInput.value.trim(),
      "图片路径": imageInput.value.trim()
    };
    if (!bookData.书名) { alert('书名不能为空'); return; }
    if (index === -1) {
      BOOKS_DATA.push(bookData);
    } else {
      BOOKS_DATA[index] = bookData;
    }
    renderBooks();
    closeForm();
    persistBooks();
  });

  document.getElementById('cancelFormBtn').addEventListener('click', closeForm);
  document.getElementById('showAddFormBtn').addEventListener('click', function() { openEditForm(-1); });

  renderBooks();
</script>

</body></html>
